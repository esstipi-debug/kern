<svg viewBox="0 0 920 430" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <radialGradient id="glowA" cx="12%" cy="-5%" r="65%">
      <stop offset="0%" stop-color="#4fd1c5" stop-opacity="0.16"/>
      <stop offset="60%" stop-color="#4fd1c5" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="102%" cy="0%" r="55%">
      <stop offset="0%" stop-color="#785aff" stop-opacity="0.12"/>
      <stop offset="60%" stop-color="#785aff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#131a26"/><stop offset="100%" stop-color="#0f141d"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5eead4"/><stop offset="100%" stop-color="#4fd1c5"/>
    </linearGradient>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#4fd1c5"/>
    </marker>
  </defs>

  <rect width="920" height="430" rx="16" fill="#080b11"/>
  <rect width="920" height="430" rx="16" fill="url(#glowA)"/>
  <rect width="920" height="430" rx="16" fill="url(#glowB)"/>

  <text x="28" y="50" fill="#e7eef6" font-size="25" font-weight="800" letter-spacing="-0.4">The engine — one question, one lens</text>
  <text x="29" y="76" fill="#9aa7b6" font-size="13.5">11 pure modules · each answers one question with one lens · every number simulation-real</text>

  <!-- INPUT -->
  <rect x="28" y="110" width="84" height="200" rx="12" fill="#0d1219" stroke="#1e2733"/>
  <rect x="28" y="110" width="4" height="200" rx="2" fill="url(#teal)"/>
  <text x="70" y="200" fill="#9aa7b6" font-size="11" text-anchor="middle" transform="rotate(-90 70 200)" letter-spacing="2">DEMAND HISTORY</text>
  <text x="70" y="290" fill="#5e6b7a" font-size="9.5" text-anchor="middle" font-family="ui-monospace,Menlo,monospace">CSV·SQL·DF</text>

  <!-- arrows between stages -->
  <line x1="113" y1="210" x2="125" y2="210" stroke="#4fd1c5" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="277" y1="210" x2="287" y2="210" stroke="#4fd1c5" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="439" y1="210" x2="449" y2="210" stroke="#4fd1c5" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="601" y1="210" x2="611" y2="210" stroke="#4fd1c5" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="763" y1="210" x2="777" y2="210" stroke="#4fd1c5" stroke-width="2" marker-end="url(#arr)"/>

  <!-- LENS PANELS -->
  <!-- 1 PREDICT @126 -->
  <rect x="126" y="110" width="150" height="200" rx="12" fill="url(#panel)" stroke="#243244"/>
  <circle cx="150" cy="139" r="13" fill="url(#teal)"/><text x="150" y="144" fill="#08110f" font-size="14" font-weight="800" text-anchor="middle">1</text>
  <text x="172" y="144" fill="#5eead4" font-size="14.5" font-weight="800" letter-spacing="0.5">PREDICT</text>
  <g font-family="ui-monospace,Menlo,monospace" font-size="11.5" fill="#cfe9e4">
    <circle cx="146" cy="177" r="2.4" fill="#4fd1c5"/><text x="156" y="181">forecasting</text>
    <circle cx="146" cy="201" r="2.4" fill="#4fd1c5"/><text x="156" y="205">distributions</text>
  </g>
  <text x="142" y="270" fill="#9aa7b6" font-size="11.5" font-style="italic">what will demand be,</text>
  <text x="142" y="286" fill="#9aa7b6" font-size="11.5" font-style="italic">and how uncertain?</text>

  <!-- 2 DECIDE @288 -->
  <rect x="288" y="110" width="150" height="200" rx="12" fill="url(#panel)" stroke="#243244"/>
  <circle cx="312" cy="139" r="13" fill="url(#teal)"/><text x="312" y="144" fill="#08110f" font-size="14" font-weight="800" text-anchor="middle">2</text>
  <text x="334" y="144" fill="#5eead4" font-size="14.5" font-weight="800" letter-spacing="0.5">DECIDE</text>
  <g font-family="ui-monospace,Menlo,monospace" font-size="11.5" fill="#cfe9e4">
    <circle cx="308" cy="177" r="2.4" fill="#4fd1c5"/><text x="318" y="181">eoq</text>
    <circle cx="308" cy="201" r="2.4" fill="#4fd1c5"/><text x="318" y="205">policies</text>
    <circle cx="308" cy="225" r="2.4" fill="#4fd1c5"/><text x="318" y="229">safety_stock</text>
  </g>
  <text x="304" y="270" fill="#9aa7b6" font-size="11.5" font-style="italic">how much, when,</text>
  <text x="304" y="286" fill="#9aa7b6" font-size="11.5" font-style="italic">and how big a buffer?</text>

  <!-- 3 OPTIMIZE @450 -->
  <rect x="450" y="110" width="150" height="200" rx="12" fill="url(#panel)" stroke="#243244"/>
  <circle cx="474" cy="139" r="13" fill="url(#teal)"/><text x="474" y="144" fill="#08110f" font-size="14" font-weight="800" text-anchor="middle">3</text>
  <text x="496" y="144" fill="#5eead4" font-size="14.5" font-weight="800" letter-spacing="0.5">OPTIMIZE</text>
  <g font-family="ui-monospace,Menlo,monospace" font-size="11.5" fill="#cfe9e4">
    <circle cx="470" cy="177" r="2.4" fill="#4fd1c5"/><text x="480" y="181">fill_rate</text>
    <circle cx="470" cy="201" r="2.4" fill="#4fd1c5"/><text x="480" y="205">cost_optimization</text>
    <circle cx="470" cy="225" r="2.4" fill="#4fd1c5"/><text x="480" y="229">simulation_opt</text>
  </g>
  <text x="466" y="270" fill="#9aa7b6" font-size="11.5" font-style="italic">is more service</text>
  <text x="466" y="286" fill="#9aa7b6" font-size="11.5" font-style="italic">worth the cost?</text>

  <!-- 4 REALITY @612 -->
  <rect x="612" y="110" width="150" height="200" rx="12" fill="url(#panel)" stroke="#243244"/>
  <circle cx="636" cy="139" r="13" fill="url(#teal)"/><text x="636" y="144" fill="#08110f" font-size="14" font-weight="800" text-anchor="middle">4</text>
  <text x="658" y="144" fill="#5eead4" font-size="14.5" font-weight="800" letter-spacing="0.5">REALITY</text>
  <g font-family="ui-monospace,Menlo,monospace" font-size="11.5" fill="#cfe9e4">
    <circle cx="632" cy="177" r="2.4" fill="#4fd1c5"/><text x="642" y="181">multi_echelon</text>
    <circle cx="632" cy="201" r="2.4" fill="#4fd1c5"/><text x="642" y="205">newsvendor</text>
    <circle cx="632" cy="225" r="2.4" fill="#4fd1c5"/><text x="642" y="229">constraints</text>
  </g>
  <text x="628" y="270" fill="#9aa7b6" font-size="11.5" font-style="italic">network, one-shot,</text>
  <text x="628" y="286" fill="#9aa7b6" font-size="11.5" font-style="italic">and what's buildable?</text>

  <!-- OUTPUT -->
  <rect x="778" y="110" width="114" height="200" rx="12" fill="#0e1a18" stroke="#1c3b39"/>
  <rect x="888" y="110" width="4" height="200" rx="2" fill="url(#teal)"/>
  <text x="833" y="196" fill="#5eead4" font-size="14" font-weight="800" text-anchor="middle">PLAN</text>
  <text x="833" y="216" fill="#9aa7b6" font-size="10.5" text-anchor="middle">QA-gated</text>
  <text x="833" y="238" fill="#cfe9e4" font-size="10.5" text-anchor="middle" font-family="ui-monospace,Menlo,monospace">+ Fuentes (L3)</text>

  <!-- VALIDATED ribbon -->
  <rect x="28" y="330" width="864" height="38" rx="10" fill="#0e1a19" stroke="#1c3b39"/>
  <circle cx="52" cy="349" r="9" fill="url(#teal)"/>
  <path d="M47.5 349 l3 3 l5.5 -6" fill="none" stroke="#08110f" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="72" y="354" font-size="12.5" fill="#9aa7b6">Every closed-form policy is cross-checked against <tspan fill="#5eead4" font-weight="700">Monte-Carlo simulation</tspan> — formula and world have to agree.</text>

  <!-- pricing track -->
  <text x="28" y="398" font-size="11.5" fill="#5e6b7a">＋ a parallel track — <tspan fill="#4fd1c5" font-family="ui-monospace,Menlo,monospace">pricing</tspan> : per-SKU elasticity → the margin-maximizing markup.</text>
</svg>
